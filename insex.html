<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mappa SVG con Zoom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toolbar">
    <button id="zoomOut" type="button">Zoom -</button>
    <button id="zoomIn" type="button">Zoom +</button>
    <button id="zoomReset" type="button">Reset 100%</button>
    <span id="zoomValue" class="zoom-label">100%</span>
  </div>

  <div id="viewer" class="viewer">
    <div id="mapWrapper" class="map-wrapper">
      <object id="mapObject" data="planimetrie/mappa.svg" type="image/svg+xml" class="map-image" aria-label="Mappa SVG"></object>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="modalClose" class="modal-close" type="button" aria-label="Chiudi modale">&times;</button>
      <h2 id="modalTitle" class="modal-title">Occorrenza selezionata</h2>
      <p id="modalContent" class="modal-content"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
