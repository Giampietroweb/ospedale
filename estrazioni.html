<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina estrazioni</title>
  <link rel="stylesheet" href="./style.css?v=20260427-2">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.css">
</head>
<body class="estrazioni-page">
  <div class="toolbar">
    <a href="index.html" class="home-cta-link-toolbar">Torna alla home</a>
  </div>

  <main class="estrazioni-main">
    <header class="estrazioni-header">
      <h1 class="estrazioni-title">Pagina estrazioni</h1>
      <p class="estrazioni-intro">
        Scegli il tipo di estrazione, filtra per blocco, piano, reparto e ID stanza, opzionalmente per il dettaglio (apparecchiatura, tipologia impiantistica o altra dotazione), poi avvia la ricerca.
      </p>
    </header>

    <section class="estrazioni-filters" aria-label="Filtri di ricerca">
      <fieldset class="estrazioni-tipo-fieldset">
        <legend class="estrazioni-tipo-legend">Tipo estrazione</legend>
        <div class="estrazioni-tipo-options">
          <label class="estrazioni-tipo-label">
            <input type="radio" name="estrazioniTipo" value="apparecchiature" checked />
            Apparecchiature
          </label>
          <label class="estrazioni-tipo-label">
            <input type="radio" name="estrazioniTipo" value="impiantistica" />
            Dotazioni impiantistiche
          </label>
          <label class="estrazioni-tipo-label">
            <input type="radio" name="estrazioniTipo" value="altre_dotazioni" />
            Altre dotazioni
          </label>
        </div>
      </fieldset>
      <div class="estrazioni-filter-grid">
        <div class="estrazioni-field">
          <label class="estrazioni-label" for="filterBlocco">Blocco</label>
          <select id="filterBlocco" name="blocco" autocomplete="off">
            <option value=""></option>
          </select>
        </div>
        <div class="estrazioni-field">
          <label class="estrazioni-label" for="filterPiano">Piano</label>
          <select id="filterPiano" name="piano" autocomplete="off">
            <option value=""></option>
          </select>
        </div>
        <div class="estrazioni-field">
          <label class="estrazioni-label" for="filterReparto">Reparto</label>
          <select id="filterReparto" name="reparto" autocomplete="off">
            <option value=""></option>
          </select>
        </div>
        <div class="estrazioni-field">
          <label class="estrazioni-label" for="filterStanza">ID Stanza</label>
          <select id="filterStanza" name="room_code" autocomplete="off">
            <option value=""></option>
          </select>
        </div>
        <div class="estrazioni-field estrazioni-field-span">
          <label class="estrazioni-label" id="estrazioniDettaglioLabel" for="filterDettaglio">Apparecchiatura</label>
          <select id="filterDettaglio" name="dettaglio" autocomplete="off">
            <option value=""></option>
          </select>
        </div>
      </div>
      <div class="estrazioni-actions">
        <button id="estrazioniSearchBtn" type="button" class="estrazioni-search-btn">Ricerca</button>
        <button id="estrazioniResetBtn" type="button" class="estrazioni-reset-btn">Reset filtri</button>
        <button id="estrazioniExportBtn" type="button" class="estrazioni-export-btn">Esporta Excel</button>
      </div>
      <p id="estrazioniError" class="estrazioni-error" role="alert" hidden></p>
    </section>

    <section class="estrazioni-results" aria-label="Risultati">
      <div class="estrazioni-results-scroll">
        <table class="estrazioni-table">
          <thead id="estrazioniTableHead"></thead>
          <tbody id="estrazioniTableBody"></tbody>
        </table>
      </div>
      <p id="estrazioniEmpty" class="estrazioni-empty" hidden>Nessun risultato per i filtri selezionati.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.complete.min.js"></script>
  <script src="./estrazioni.js?v=20260427-7"></script>
</body>
</html>
