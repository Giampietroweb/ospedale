<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mappa SVG con Zoom</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="toolbar">
    <button id="zoomOut" type="button">Zoom -</button>
    <button id="zoomIn" type="button">Zoom +</button>
    <button id="zoomReset" type="button">Reset 100%</button>
    <span id="zoomValue" class="zoom-label">100%</span>
  </div>

  <div id="viewer" class="viewer">
    <div id="mapWrapper" class="map-wrapper">
      <object id="mapObject" data="../planimetrie/mappa.svg" type="image/svg+xml" class="map-image" aria-label="Mappa SVG"></object>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="modalClose" class="modal-close" type="button" aria-label="Chiudi modale">&times;</button>
      <h2 id="modalTitle" class="modal-title">Dettagli stanza</h2>
      <div class="modal-header-fields">
        <div class="modal-field">
          <span class="modal-field-label">Codice stanza</span>
          <div class="modal-field-main">
            <span id="roomCodeValue" class="modal-field-value">-</span>
            <input id="roomCodeInput" class="modal-field-input" type="text" hidden>
            <button id="editRoomCodeButton" class="modal-edit-button" type="button">Modifica</button>
          </div>
        </div>
        <div class="modal-field">
          <span class="modal-field-label">Descrizione</span>
          <div class="modal-field-main">
            <span id="roomDescriptionValue" class="modal-field-value">Placeholder descrizione stanza</span>
            <input id="roomDescriptionInput" class="modal-field-input" type="text" hidden>
            <button id="editRoomDescriptionButton" class="modal-edit-button" type="button">Modifica</button>
          </div>
        </div>
        <div class="modal-field">
          <span class="modal-field-label">Reparto</span>
          <div class="modal-field-main">
            <span id="roomDepartmentValue" class="modal-field-value">cardiologia</span>
            <input id="roomDepartmentInput" class="modal-field-input" type="text" hidden>
            <button id="editRoomDepartmentButton" class="modal-edit-button" type="button">Modifica</button>
          </div>
        </div>
      </div>
      <div class="modal-sections" role="tablist" aria-label="Sezioni dati stanza">
        <button id="sectionApparecchiatura" class="modal-section-button is-active" type="button" role="tab" aria-selected="true">Apparecchiatura</button>
        <button id="sectionImpiantistica" class="modal-section-button" type="button" role="tab" aria-selected="false">Impiantistica</button>
      </div>
      <div id="contentApparecchiatura" class="modal-section-content is-active" role="tabpanel">
        <div class="table-editor" id="apparecchiaturaEditor">
          <div class="table-editor-grid">
            <label class="table-editor-field">
              <span>Tipologia</span>
              <input id="appTipologiaInput" type="text">
            </label>
            <label class="table-editor-field">
              <span>QTA</span>
              <input id="appQtaInput" type="number" min="0">
            </label>
            <label class="table-editor-field">
              <span>Nuovo</span>
              <input id="appNuovoInput" type="text">
            </label>
            <label class="table-editor-field">
              <span>trasferimento</span>
              <input id="appTrasferimentoInput" type="text">
            </label>
            <label class="table-editor-field">
              <span>inv</span>
              <input id="appInvInput" type="text">
            </label>
            <label class="table-editor-field">
              <span>note</span>
              <input id="appNoteInput" type="text">
            </label>
          </div>
          <div class="table-editor-actions">
            <button id="appAddButton" class="table-editor-button table-editor-button-primary" type="button">Aggiungi</button>
            <button id="appSaveButton" class="table-editor-button table-editor-button-success" type="button" hidden>Salva modifica</button>
            <button id="appCancelButton" class="table-editor-button table-editor-button-muted" type="button" hidden>Annulla</button>
          </div>
        </div>
        <table class="modal-table">
          <thead>
            <tr>
              <th>Tipologia</th>
              <th>QTA</th>
              <th>Nuovo</th>
              <th>trasferimento</th>
              <th>inv</th>
              <th>note</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="apparecchiaturaTableBody"></tbody>
        </table>
      </div>
      <div id="contentImpiantistica" class="modal-section-content" role="tabpanel" hidden>
        <div class="table-editor" id="impiantisticaEditor">
          <div class="table-editor-grid">
            <label class="table-editor-field">
              <span>Tipologia</span>
              <input id="impTipologiaInput" type="text">
            </label>
            <label class="table-editor-field">
              <span>Qta presenti</span>
              <input id="impQtaPresentiInput" type="number" min="0">
            </label>
            <label class="table-editor-field">
              <span>Qta da implementare</span>
              <input id="impQtaImplementareInput" type="number" min="0">
            </label>
          </div>
          <div class="table-editor-actions">
            <button id="impAddButton" class="table-editor-button table-editor-button-primary" type="button">Aggiungi</button>
            <button id="impSaveButton" class="table-editor-button table-editor-button-success" type="button" hidden>Salva modifica</button>
            <button id="impCancelButton" class="table-editor-button table-editor-button-muted" type="button" hidden>Annulla</button>
          </div>
        </div>
        <table class="modal-table">
          <thead>
            <tr>
              <th>Tipologia</th>
              <th>Qta presenti</th>
              <th>Qta da implementare</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="impiantisticaTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
